[project]
name = "thetakit-cloud-client"
version = "0.1.0"
description = "Client library for thetakit.cloud hosted evaluation service"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/thetakit_cloud_client"]
