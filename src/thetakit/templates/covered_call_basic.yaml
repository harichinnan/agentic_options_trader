name: CoveredCall-Basic
description: >
  Basic covered call on an ETF/equity position. Sell 0.30 delta calls 30-45 DTE,
  close at 50% profit, roll on DTE threshold or if short strike is tested. Assumes
  the underlying shares are already held.

entry:
  strategy: CC
  delta_target: 0.30
  delta_tolerance: 0.05
  dte_target: 35
  dte_tolerance: 7
  symbols:
    - SLV
    - GLD
    - XLE
  skip_if_ex_div_within_days: 3

sizing:
  mode: fixed_contracts
  contracts: 1

rolls:
  - trigger: dte_threshold
    dte_threshold: 14
    target_dte: 35
    target_delta: 0.30
  - trigger: short_strike_tested
    target_dte: 35
    target_delta: 0.30

exits:
  - profit_target_pct: 0.5
  - dte_close: 7

risk:
  max_concurrent_positions: 5
  max_capital_per_symbol_pct: 0.30
  initial_capital: 50000
