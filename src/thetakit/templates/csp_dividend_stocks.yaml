name: CSP-Dividend-Stocks
description: >
  Cash-secured puts on dividend aristocrats. 0.25 delta, 45 DTE, assignment
  accepted (ultimately owning dividend-paying shares is the goal). Skip around
  earnings to avoid volatility shocks.

entry:
  strategy: CSP
  delta_target: 0.25
  delta_tolerance: 0.05
  dte_target: 45
  dte_tolerance: 10
  min_iv_rank: 25
  symbols:
    - KO
    - PG
    - JNJ
    - PEP
    - CVX
  skip_if_earnings_within_days: 10
  skip_if_ex_div_within_days: 3

sizing:
  mode: pct_bp
  pct_bp: 0.04

rolls:
  - trigger: dte_threshold
    dte_threshold: 14
    target_dte: 45
    target_delta: 0.25

exits:
  - profit_target_pct: 0.5
  - dte_close: 7

risk:
  max_concurrent_positions: 10
  max_capital_per_symbol_pct: 0.15
  initial_capital: 100000
